<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日复盘报告</title>
<style>
:root {
  --bg-header: #1a2332; --gold: #c9a962; --bank-blue: #1565c0; --citic-red: #8b1a1a;
  --bg-body: #f0f2f5; --bg-card: #fff; --text-primary: #1a202c; --text-secondary: #4a5568;
  --shadow-md: 0 4px 12px rgba(0,0,0,0.1); --radius-md: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg-body); font-family:"Microsoft YaHei","PingFang SC",sans-serif; color:var(--text-primary); line-height:1.8; }
.top-header {
  background:linear-gradient(135deg, #0d1b2a, #1a2332, #2d3a4a);
  color:#fff; padding:48px 0 32px; text-align:center; border-bottom:4px solid var(--gold);
}
.top-header h1 { font-size:32px; letter-spacing:4px; margin-bottom:8px; }
.top-header .sub { color:#b0bec5; font-size:14px; letter-spacing:2px; }
.container { max-width:900px; margin:0 auto; padding:24px; }
.section-label { font-size:13px; color:var(--text-secondary); margin:28px 0 8px; padding:6px 14px; display:inline-block; border-radius:4px; letter-spacing:2px; }
.section-label.bank { background:#e3f2fd; color:var(--bank-blue); border-left:3px solid var(--bank-blue); }
.section-label.market { background:#fce4ec; color:var(--citic-red); border-left:3px solid var(--citic-red); }
.review-list { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
.review-card {
  background:var(--bg-card); border-radius:var(--radius-md); box-shadow:var(--shadow-md);
  padding:22px 28px; display:flex; align-items:center; justify-content:space-between;
  transition:all 0.2s; border-left:5px solid var(--bank-blue); text-decoration:none; color:inherit;
}
.review-card.market { border-left-color: var(--citic-red); }
.review-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.15); }
.review-card .date { font-size:20px; font-weight:700; }
.review-card .label { font-size:13px; color:var(--text-secondary); }
.review-card .arrow { font-size:24px; }
.review-card.bank .arrow { color:var(--bank-blue); }
.review-card.market .arrow { color:var(--citic-red); }
.footer { text-align:center; padding:32px; color:#8899aa; font-size:12px; margin-top:48px; border-top:1px solid #e2e8f0; }
</style>
</head>
<body>
<header class="top-header">
  <h1>📊 每日复盘报告</h1>
  <div class="sub">Daily Market Review Reports</div>
</header>
<div class="container">
  <div class="section-label market">🏛️ A股全市场复盘</div>
  <div class="review-list" id="marketList"></div>
  <div class="section-label bank">🏦 银行业深度复盘</div>
  <div class="review-list" id="bankList"></div>
</div>
<footer class="footer">
  <p>数据来源：东方财富Choice · 妙想金融终端 · Wind · 央行官网</p>
  <p>免责声明：本报告仅供投资研究参考，不构成投资建议。</p>
  <p style="margin-top:4px;">© 2026 Daily Review Reports | Powered by Claude Code</p>
</footer>
<script>
const marketReviews = [
  { date: '2026-07-22', file: '2026-07-22_ashare_review.html', label: '周三 · 全市场30行业 + 宏观政策 + 海外 + 基金推荐' },
];
const bankReviews = [
  { date: '2026-07-22', file: '2026-07-22_银行业每日复盘.html', label: '周三 · 银行板块+1.14% · 33只收红 · 42只逐股分析' },
];
function render(list, containerId, cardClass) {
  const container = document.getElementById(containerId);
  list.forEach(r => {
    const a = document.createElement('a');
    a.className = 'review-card ' + cardClass;
    a.href = r.file;
    a.innerHTML = `<div><div class="date">${r.date}</div><div class="label">${r.label}</div></div><div class="arrow">→</div>`;
    container.appendChild(a);
  });
}
render(marketReviews, 'marketList', 'market');
render(bankReviews, 'bankList', 'bank');
</script>
</body>
</html>
